version: "3.8"
services:
  db:
    image: postgres:16
    container_name: family_kb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: familykb
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: family_kb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: