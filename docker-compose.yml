version: "3.8"

services:
  db:
    image: postgres:16
    container_name: family_kb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: familykb
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: familykb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./family-kb-api
    restart: unless-stopped
    env_file:
      - ./family-kb-api/.env
    ports:
      - "4000:4000"
    depends_on:
      - db
    volumes:
      - ./family-kb-api/uploads:/app/uploads

  frontend:
    build:
      context: ./family-kb-frontend
      args:
        - BACKEND_URL=http://backend:4000
    restart: unless-stopped
    env_file:
      - ./family-kb-frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
